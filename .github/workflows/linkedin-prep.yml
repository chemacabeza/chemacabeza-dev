name: Prepare LinkedIn cross-posts

on:
  push:
    branches: [master]
    paths:
      - 'content/posts/**.mdx'

# One queue update at a time so concurrent merges can't race on posts.json.
concurrency:
  group: linkedin-prep
  cancel-in-progress: false

jobs:
  prepare:
    # Don't recurse on the bot's own commit.
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write # to dispatch linkedin-publish after queueing
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect new posts and prepare blurbs
        id: prep
        run: node .github/scripts/prepare-linkedin-posts.mjs

      - name: Commit updated queue
        if: steps.prep.outputs.count != '0' && steps.prep.outputs.count != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/linkedin-poster/posts.json
          git commit -m "chore: queue LinkedIn blurbs for new posts [skip ci]"
          # Rebase-and-retry on push. Other workflows (medium-publish,
          # linkedin-publish) also push to master with their own [skip ci]
          # status commits, so master can move between our checkout and push.
          # Each workflow touches its own posts.json, so rebases never conflict.
          n=0
          until git push; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "Push still rejected after 3 attempts" >&2; exit 1; fi
            echo "Push rejected (attempt $n) — rebasing on origin/master and retrying..."
            git pull --rebase origin master
          done

      - name: Trigger LinkedIn publish
        # The queue commit above carries [skip ci] (so Vercel doesn't rebuild and
        # GitHub doesn't auto-fire workflows), so we explicitly dispatch the
        # publisher to post the new blurb(s) now. Its own status commit is
        # [skip ci], so this does not recurse.
        if: steps.prep.outputs.count != '0' && steps.prep.outputs.count != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'linkedin-publish.yml',
              ref: 'master',
            });
            core.info('Dispatched linkedin-publish.yml to post the new blurb(s).');

      - name: Open notification issue
        if: steps.prep.outputs.count != '0' && steps.prep.outputs.count != ''
        uses: actions/github-script@v7
        env:
          ADDED: ${{ steps.prep.outputs.added }}
          COUNT: ${{ steps.prep.outputs.count }}
          BODY: ${{ steps.prep.outputs.body }}
        with:
          script: |
            const count = process.env.COUNT;
            const added = process.env.ADDED.split(',').filter(Boolean);
            const body = process.env.BODY || '';
            const title = `📝 ${count} new post${count === '1' ? '' : 's'} auto-published to LinkedIn`;
            const intro = [
              `Blurbs were added to \`scripts/linkedin-poster/posts.json\` and **the publish workflow was dispatched automatically** — these post to LinkedIn without any manual step.`,
              ``,
              `Check the run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/linkedin-publish.yml`,
              ``,
              `If a blurb needs editing, change it in the queue file and re-run that workflow:`,
              `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/scripts/linkedin-poster/posts.json`,
              ``,
              `---`,
              ``,
              body,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: intro,
              labels: ['linkedin'],
            });
