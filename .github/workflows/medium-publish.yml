name: Publish due Medium posts

on:
  schedule:
    # Every 30 minutes. GH cron has up to ~15 min drift; the 12h delay is
    # approximate by design, so this is plenty granular.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      verify_only:
        description: 'Just smoke-test the session cookie (no posting)'
        type: boolean
        default: false

concurrency:
  group: medium-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check secret configured
        id: check
        env:
          JAR: ${{ secrets.MEDIUMCOOKIEJAR }}
          SID: ${{ secrets.MEDIUM_SESSION_COOKIE }}
        run: |
          if [ -z "$JAR" ] && [ -z "$SID" ]; then
            echo "::warning::Neither MEDIUMCOOKIEJAR nor MEDIUM_SESSION_COOKIE is set — skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip-early check (anything due?)
        if: steps.check.outputs.configured == 'true' && inputs.verify_only != true
        id: due
        run: |
          DUE=$(node -e "
            const a = JSON.parse(require('node:fs').readFileSync('scripts/medium-poster/posts.json','utf8'));
            const now = Date.now();
            const n = a.filter(p => !p.posted && p.scheduledFor && new Date(p.scheduledFor).getTime() <= now).length;
            console.log(n);
          ")
          echo "count=$DUE" >> "$GITHUB_OUTPUT"
          echo "Posts due: $DUE"

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true' && (inputs.verify_only == true || steps.due.outputs.count != '0')
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.check.outputs.configured == 'true' && (inputs.verify_only == true || steps.due.outputs.count != '0')
        run: npx playwright install --with-deps chromium

      # xvfb provides a virtual X display so we can run Chromium in HEADED
      # mode without a real screen. Medium's framework JS doesn't fully
      # initialise the import page in pure headless mode (no contenteditable
      # attribute is added, the URL field stays zero-height, the Import
      # button has no click handler). Running headed under xvfb bypasses
      # whatever detection is gating that. Idempotent if already installed
      # via playwright --with-deps.
      - name: Install xvfb
        if: steps.check.outputs.configured == 'true' && (inputs.verify_only == true || steps.due.outputs.count != '0')
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Smoke-test session cookies
        if: steps.check.outputs.configured == 'true' && inputs.verify_only == true
        env:
          MEDIUM_COOKIE_JAR: ${{ secrets.MEDIUMCOOKIEJAR }}
          MEDIUM_SESSION_COOKIE: ${{ secrets.MEDIUM_SESSION_COOKIE }}
          MEDIUM_HEADLESS: 'false'
        run: xvfb-run -a node scripts/medium-poster/publish-via-import.mjs --verify-cookie

      - name: Publish to Medium via import
        if: steps.check.outputs.configured == 'true' && inputs.verify_only != true && steps.due.outputs.count != '0'
        env:
          MEDIUM_COOKIE_JAR: ${{ secrets.MEDIUMCOOKIEJAR }}
          MEDIUM_SESSION_COOKIE: ${{ secrets.MEDIUM_SESSION_COOKIE }}
          MEDIUM_AUTO_PUBLISH: ${{ vars.MEDIUM_AUTO_PUBLISH || 'true' }}
          MEDIUM_HEADLESS: 'false'
        run: xvfb-run -a node scripts/medium-poster/publish-via-import.mjs

      - name: Upload debug artifacts on failure
        if: failure() && steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: medium-debug
          path: scripts/medium-poster/debug/
          if-no-files-found: ignore
          retention-days: 7
          include-hidden-files: true

      - name: Commit posted-status updates
        if: steps.check.outputs.configured == 'true' && inputs.verify_only != true && steps.due.outputs.count != '0'
        run: |
          if git diff --quiet scripts/medium-poster/posts.json; then
            echo "No status changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/medium-poster/posts.json
          git commit -m "chore: mark Medium posts as published [skip ci]"
          # Rebase-and-retry on push — master can move between our checkout
          # and push if another workflow's status commit (or a human commit)
          # landed in the meantime. Each workflow touches its own posts.json,
          # so rebases never conflict.
          n=0
          until git push; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "Push still rejected after 3 attempts" >&2; exit 1; fi
            echo "Push rejected (attempt $n) — rebasing on origin/master and retrying..."
            git pull --rebase origin master
          done
