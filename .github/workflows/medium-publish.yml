name: Publish due Medium posts

# Medium killed both their integration-token API (2024) and now their UI
# import flow for automated browsers (verified across multiple runs in
# May 2026 — Playwright in headed xvfb mode with fresh cookies including
# xsrf can populate the field but cannot trigger the Import handler;
# Medium's framework actively suppresses it and returns 403 on follow-up
# API calls). So this workflow no longer tries to publish. Instead it
# maintains a single open "Medium queue" issue listing due posts with
# one-click import URLs — manually imported in ~30s/post via the browser.
#
# To restore automated publishing later: revert to the pre-cleanup state
# of this file and scripts/medium-poster/publish-via-import.mjs (kept on
# disk as a starting point if Medium ever reopens automation).

on:
  schedule:
    # Every 30 minutes — same cadence as before. The issue is updated
    # in-place so this isn't spammy; only the post-list and count change.
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: medium-publish
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute due posts and sync queue issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const posts = JSON.parse(fs.readFileSync('scripts/medium-poster/posts.json', 'utf8'));
            const now = Date.now();
            const due = posts.filter(
              (p) => !p.posted && p.scheduledFor && new Date(p.scheduledFor).getTime() <= now,
            );
            const pending = posts.filter((p) => !p.posted);
            const LABEL = 'medium-queue';
            const SITE = process.env.SITE_URL || 'https://chemacabeza.dev';

            // Find existing open queue issue (we maintain at most one).
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
              per_page: 5,
            });

            if (due.length === 0) {
              if (existing.data.length > 0) {
                for (const iss of existing.data) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: iss.number,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  console.log(`Closed queue issue #${iss.number} — nothing due.`);
                }
              }
              return;
            }

            const line = (p) => {
              const importUrl = `https://medium.com/p/import?url=${encodeURIComponent(SITE + '/writing/' + p.slug)}`;
              const tags = (p.tags || []).join(', ');
              return `- [ ] **${p.slug}** — [open in Medium importer](${importUrl})` +
                (tags ? `  _(tags: ${tags})_` : '');
            };

            const title = `📝 Medium queue: ${due.length} post${due.length === 1 ? '' : 's'} due` +
              (pending.length > due.length ? ` (${pending.length} total pending)` : '');

            const body = [
              `${due.length} post${due.length === 1 ? '' : 's'} scheduled for Medium cross-posting are due.`,
              ``,
              `**For each one:**`,
              `1. Click the importer link below — it opens \`medium.com/p/import\` with the source URL prefilled.`,
              `2. Click **Import** on the Medium page.`,
              `3. Add tags on the publish dialog, then **Publish**.`,
              `4. Tick the box here so others know it's done.`,
              ``,
              `**Due now:**`,
              ...due.map(line),
              pending.length > due.length ? `\n**Pending (scheduled for later):** ${pending.length - due.length}` : ``,
              ``,
              `---`,
              `_When you've imported a post, mark its **\`posted: true\`** with a \`postedAt\` timestamp in_`,
              `_\`scripts/medium-poster/posts.json\` so the next run removes it from this list. The cron_`,
              `_updates this issue every 30 min._`,
              ``,
              `<sub>Auto-generated by .github/workflows/medium-publish.yml — do not delete this issue manually; it'll close itself when the queue is empty.</sub>`,
            ].join('\n');

            if (existing.data.length > 0) {
              const iss = existing.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: iss.number,
                title,
                body,
              });
              console.log(`Updated issue #${iss.number} — ${due.length} due.`);
              // Close any extras (shouldn't happen, but defensive).
              for (const extra of existing.data.slice(1)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: extra.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
                console.log(`Closed duplicate queue issue #${extra.number}`);
              }
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [LABEL],
              });
              console.log(`Created issue #${created.data.number} — ${due.length} due.`);
            }
